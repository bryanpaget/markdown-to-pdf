name: Test LibreOffice PDF Conversion

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Pandoc
        run: |
          wget -q https://github.com/jgm/pandoc/releases/download/3.10/pandoc-3.10-1-amd64.deb
          sudo dpkg -i pandoc-3.10-1-amd64.deb

      - name: Create sample DOCX
        run: |
          mkdir -p output
          cat > /tmp/sample.md <<'EOF'
          # Test Document

          This is a test document for PDF conversion.

          ## Section 1

          - Item 1
          - Item 2
          - Item 3

          | Column A | Column B |
          |----------|----------|
          | Cell 1   | Cell 2   |
          EOF
          pandoc /tmp/sample.md -o output/sample.docx --reference-doc=template.docx 2>/dev/null || \
          pandoc /tmp/sample.md -o output/sample.docx

      - name: Convert to PDF
        uses: ./
        with:
          docx_file: "output/sample.docx"
          pdf_file: "output/sample.pdf"

      - name: Verify PDF is valid
        run: |
          set -euo pipefail
          if [[ ! -f output/sample.pdf ]]; then
            echo "::error::PDF was not generated"
            exit 1
          fi
          if ! head -c 4 output/sample.pdf | grep -q '%PDF'; then
            echo "::error::Not a valid PDF"
            exit 1
          fi
          SIZE=$(stat -c%s output/sample.pdf)
          echo "Generated PDF size: $SIZE bytes"
          if [[ "$SIZE" -lt 1000 ]]; then
            echo "::error::PDF is suspiciously small ($SIZE bytes)"
            exit 1
          fi
          echo "PDF validation passed"

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: sample-pdf
          path: output/sample.pdf
