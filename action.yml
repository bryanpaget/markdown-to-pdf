name: "Markdown to PDF Converter"
description: "Converts a Markdown file to a PDF using Pandoc and XeLaTeX."
author: "gccloudone"

inputs:
  markdown_file:
    description: "Path to the Markdown file to be converted."
    required: true
  output_file:
    description: "Path to the output PDF file."
    required: false
    default: "output/output.pdf"
  default_title:
    description: "Default title for the PDF document."
    required: true
  number_sections:
    description: "Add section numbers to headings (--number-sections)"
    required: false
    default: "false"
  classification:
    description: "Classification text for the document (e.g., 'Unclassified | Non classifie')."
    required: false
    default: "Unclassified | Non classifie"
  settings_file:
    description: "Path to a Pandoc defaults YAML file."
    required: false
    default: "settings/pdf-settings.yml"
  bibliography:
    description: "Path to a BibTeX bibliography file. Enables citeproc when present."
    required: false
    default: ""
  lua_filters:
    description: "Comma-separated list of Lua filter filenames."
    required: false
    default: "pagebreak.lua"
  extra_pandoc_args:
    description: "Additional raw arguments appended to the Pandoc command."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Pandoc
      shell: bash
      run: |
        echo "Installing Pandoc"
        wget -q https://github.com/jgm/pandoc/releases/download/3.10/pandoc-3.10-1-amd64.deb
        sudo dpkg -i pandoc-3.10-1-amd64.deb
        pandoc --version

    - name: Install TeX Live and supporting tools
      shell: bash
      run: |
        echo "Installing TeX Live (XeLaTeX) and supporting packages"
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          texlive-xetex \
          texlive-fonts-recommended \
          texlive-latex-recommended \
          texlive-latex-extra \
          texlive-fonts-extra \
          fonts-dejavu-core \
          fonts-liberation \
          fonts-noto-color-emoji \
          fonts-symbola \
          fonts-texgyre \
          lmodern
        xelatex --version

    - name: Convert Markdown to PDF
      shell: bash
      env:
        INPUT_NUMBER_SECTIONS: ${{ inputs.number_sections }}
      run: |
        "${{ github.action_path }}/convert-to-pdf.sh" \
          "${{ inputs.default_title }}" \
          "${{ inputs.markdown_file }}" \
          "${{ inputs.output_file }}" \
          "${{ inputs.settings_file }}" \
          "${{ inputs.bibliography }}" \
          "${{ inputs.classification }}" \
          "${{ inputs.extra_pandoc_args }}" \
          "${{ inputs.lua_filters }}"
