name: "LibreOffice Word to PDF"
description: >-
  Convert a .docx (or .doc) file to a PDF using LibreOffice in headless mode.
  The PDF preserves the Word document's layout, fonts, and template styling,
  which is not possible with a separate Pandoc/LaTeX render.

branding:
  icon: "file-text"
  color: "blue"

inputs:
  docx_file:
    description: "Path to the source Word document (.docx or .doc) to convert."
    required: true
  pdf_file:
    description: "Path where the resulting PDF should be written."
    required: true

outputs:
  pdf_file:
    description: "Resolved path to the generated PDF (same as inputs.pdf_file)."
    value: ${{ steps.convert.outputs.pdf_file }}

runs:
  using: "composite"
  steps:
    - name: Verify LibreOffice is available
      shell: bash
      run: |
        if ! command -v soffice >/dev/null 2>&1 && ! command -v libreoffice >/dev/null 2>&1; then
          echo "::error::LibreOffice (soffice) is not installed. Install it with: sudo apt-get install -y libreoffice-writer"
          exit 1
        fi

    - name: Convert Word document to PDF
      id: convert
      shell: bash
      run: |
        set -euo pipefail

        SRC="${{ inputs.docx_file }}"
        DEST="${{ inputs.pdf_file }}"

        if [ ! -f "$SRC" ]; then
          echo "::error::Source document not found: $SRC"
          exit 1
        fi

        # Ensure the destination directory exists.
        mkdir -p "$(dirname "$DEST")"
        DEST="$(cd "$(dirname "$DEST")" && pwd)/$(basename "$DEST")"

        OUTDIR="$(cd "$(dirname "$DEST")" && pwd)"
        BASE="$(basename "$DEST" .pdf)"

        # LibreOffice writes "<basename>.pdf" into OUTDIR. We give it the
        # desired base name by temporarily copying the source if needed.
        SRC_NAME="$(basename "$SRC")"
        SRC_BASE="${SRC_NAME%.*}"
        SRC_EXT="${SRC_NAME##*.}"

        WORK=""
        if [ "$SRC_BASE" != "$BASE" ]; then
          WORK="$(mktemp -d)"
          cp "$SRC" "$WORK/$BASE.$SRC_EXT"
          SRC_TO_CONVERT="$WORK/$BASE.$SRC_EXT"
        else
          SRC_TO_CONVERT="$SRC"
        fi

        # Run headless conversion. A clean per-run profile avoids lock
        # contention when multiple conversions run on the same runner.
        PROFILE="$(mktemp -d)"
        soffice --headless \
          --nofirststartwizard \
          --norestore \
          --invisible \
          -env:UserInstallation="file://$PROFILE" \
          --convert-to pdf \
          --outdir "$OUTDIR" \
          "$SRC_TO_CONVERT"
        rm -rf "$PROFILE" "$WORK" 2>/dev/null || true

        GENERATED="$OUTDIR/$BASE.pdf"
        if [ ! -f "$GENERATED" ]; then
          echo "::error::LibreOffice did not produce $GENERATED"
          exit 1
        fi

        # If the generated file landed at a different path than requested
        # (e.g. source basename differed), move it into place.
        if [ "$GENERATED" != "$DEST" ]; then
          mv -f "$GENERATED" "$DEST"
        fi

        echo "pdf_file=$DEST" >> "$GITHUB_OUTPUT"
        echo "Converted $SRC -> $DEST"
