# =============================================================================
# Pandoc defaults for Markdown -> PDF (XeLaTeX) conversion.
# =============================================================================

# ----- Document metadata (overridden by workflow inputs) -----
metadata:
  # Leave empty; title, author, date, classification, version are passed via --metadata.
  # You can set fallback values here if needed, e.g.:
  # author: "Shared Services Canada"

# ----- LaTeX variables (injected into the default template) -----
variables:
  # ----- Fonts & Typography -----
  fontsize: 10pt                 # 9pt, 10pt, 11pt, 12pt
  mainfont: "TeX Gyre Heros"     # Helvetica clone; also: DejaVu Sans, Arial, Liberation Sans
  sansfont: "TeX Gyre Heros"     # Same as mainfont for consistency
  monofont: "TeX Gyre Cursor"    # Courier clone; also: DejaVu Sans Mono, Liberation Mono
  # If you want a different font for headings, add:
  # mainfontoptions: "BoldFont=TeX Gyre Heros Bold, ItalicFont=TeX Gyre Heros Italic"
  # sansfontoptions: "BoldFont=TeX Gyre Heros Bold, ItalicFont=TeX Gyre Heros Italic"

  # ----- Layout & Margins -----
  geometry: "margin=0.8in"       # Increase to 0.5in or 0.6in for more breathing room
  papersize: letter              # letter, a4, a5, legal
  # For custom margin per side: "left=0.5in, right=0.5in, top=0.6in, bottom=0.6in"

  # ----- Line Spacing -----
  linestretch: 1.3               # 1.0 is single; 1.5 is Word default; 1.2 is compact

  # ----- Paragraph Formatting -----
  indent: true                   # false to remove first-line indent (pandoc default is true)
  # If you want to control parskip, use:
  parskip: full                  # Options: full, half, none (adds vertical space between paragraphs)

  # ----- Title Page -----
  titlepage: true                # false to suppress separate title page
  # titlepage-color: "FFFFFF"    # Background color for title page (6-digit hex)
  # titlepage-text-color: "000000"
  # titlepage-rule-color: "000000"
  # titlepage-rule-height: 0     # Set to e.g. 4pt for a decorative rule

  # ----- Table of Contents -----
  # toc-title: "Contents"        # Customise TOC heading

  # ----- Headings -----
  # secnumdepth: 3               # Number sections down to subsubsection (3)
  # tocdepth: 3                  # Show up to subsubsection in TOC

  # ----- Page Numbering -----
  pagestyle: "plain"             # Options: empty, plain, headings, myheadings
  # page-background: ""          # Background image/color

  # ----- Custom LaTeX Preamble (ultra-compact tables) -----
  # Note: header-includes can be a list or a multi-line string.
  # For more LaTeX customisations, add them here.
  header-includes:
    - \usepackage{graphicx}
    - \usepackage{booktabs}
    - \usepackage{multirow}
    - \usepackage{makecell}
    - \usepackage{ragged2e}
    - \usepackage{caption}
    - \usepackage{longtable}
    - \captionsetup[table]{font=footnotesize, labelfont=bf}

    # Table size and spacing
    - \AtBeginEnvironment{tabular}{\footnotesize\setlength{\tabcolsep}{2.5pt}\renewcommand{\arraystretch}{1.0}}
    - \AtBeginEnvironment{tabularx}{\footnotesize\setlength{\tabcolsep}{2.5pt}\renewcommand{\arraystretch}{1.0}}
    - \AtBeginEnvironment{longtable}{\footnotesize\setlength{\tabcolsep}{2.5pt}\renewcommand{\arraystretch}{1.0}}

    # Additional table tweaks (optional):
    # - \setlength{\arrayrulewidth}{0.5pt}   # Thinner horizontal/vertical rules
    # - \renewcommand{\tabularxcolumn}[1]{m{#1}}  # Vertical centering in X columns
    # - \usepackage{colortbl}                # For coloured table cells

    # ---- Page layout extras ----
    # - \usepackage{fancyhdr}               # Custom headers/footers
    # - \pagestyle{fancy}
    # - \fancyhead[L]{\leftmark}            # Section name in header
    # - \fancyhead[R]{\thepage}
    # - \renewcommand{\headrulewidth}{0.4pt}
    # - \usepackage{lastpage}               # For "Page X of Y" footers

    # ---- Code listings ----
    # - \usepackage{listings}               # For better code formatting than default
    # - \lstset{basicstyle=\ttfamily\footnotesize, breaklines=true}

# ----- Pandoc global options -----
toc: true
number-sections: true
# If you want to exclude certain sections from numbering:
# number-sections: false
# Or override with `--number-sections`/`--no-number-sections` via extra_pandoc_args.

# You can also set these (though they are typically passed via --metadata):
# title: "Default title"
# author: "Default author"
# date: "2026-07-17"
