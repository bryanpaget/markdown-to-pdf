# Pandoc defaults for Markdown -> PDF (XeLaTeX) conversion.
#
# This file is loaded via `pandoc --defaults`. Values here can be overridden by
# the action's metadata inputs (title, author, date, classification, version)
# and by `extra_pandoc_args`.
#
# Reference: https://pandoc.org/MANUAL.html#defaults-files

# Document variables (exposed to the LaTeX template via $variable$).
variables:
  fontsize: 10pt
  linestretch: 1.15
  mainfont: "DejaVu Sans"
  monofont: "DejaVu Sans Mono"
  classoption: "letterpaper"
  geometry: "margin=0.75in"

metadata:
  # This will be inserted into the preamble of the default template.
  header-includes: |
    \usepackage{caption}
    \captionsetup[table]{font=small, labelfont=bf}
    \AtBeginEnvironment{tabular}{\small}
    \AtBeginEnvironment{longtable}{\small}
    \setlength{\tabcolsep}{4pt}
    \renewcommand{\arraystretch}{1.1}

toc: true
number-sections: true
